name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build ./cmd/server
          go build ./cmd/launcher

      - name: Test
        run: go test ./...

  fyne-windows:
    name: Fyne Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build launcher
        shell: pwsh
        run: go build -tags fyne -o "$env:RUNNER_TEMP\baeum-maru-launcher.exe" ./cmd/launcher

