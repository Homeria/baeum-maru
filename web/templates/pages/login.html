{{define "login"}}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 - {{.DisplayName}}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <main class="auth-page">
    <form class="auth-panel" method="post" action="/login">
      <input type="hidden" name="next" value="{{.Next}}">
      <div>
        <p class="auth-brand">{{.DisplayName}}</p>
        <h1>관리자 로그인</h1>
      </div>
      {{if .Error}}<p class="alert error" role="alert">{{.Error}}</p>{{end}}
      <label>접속 코드 <input name="access_code" autocomplete="one-time-code" autofocus required></label>
      <button type="submit">로그인</button>
      <p class="subtle">런처에서 발급한 유효한 접속 코드를 입력합니다.</p>
    </form>
  </main>
</body>
</html>
{{end}}
